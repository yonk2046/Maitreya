name: Maitreya Daily Pipeline

on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch market pulse
        run: python tools/fetch_market_pulse.py || echo "non-trading day, skipping"

      - name: Run daily pipeline
        run: make daily || echo "replay mismatch, continuing"

      - name: Verify index
        continue-on-error: true
        run: make verify-index

      - name: Run fast tests
        continue-on-error: true
        run: make test-fast

      - name: Commit data + reports
        run: |
          git config user.name  "maitreya-bot"
          git config user.email "maitreya-bot@users.noreply.github.com"
          git add data/ reports/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "data: daily pipeline ${DATE} [skip ci]"
            git push
          fi
```

