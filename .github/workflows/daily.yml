name: Maitreya Daily Pipeline
on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
env:
  TZ: Asia/Taipei
jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      # H3 stability proof requires failures to be VISIBLE — do not mask
      # make daily / verify-index. If either fails, suspect data must NOT
      # be auto-committed. (B1 epoch-aware verify landed 2026-06-11;
      # replay mismatches now indicate real corruption, not schema drift.)
      - name: Run daily pipeline
        run: make daily
      - name: Verify index
        run: make verify-index
      - name: Run fast tests
        continue-on-error: true  # visibility only; must not block data commit
        run: make test-fast
      - name: Commit data and reports
        run: |
          git config user.name "maitreya-bot"
          git config user.email "maitreya-bot@users.noreply.github.com"
          git add data/ reports/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: daily pipeline $(date +%Y-%m-%d) [skip ci]"
            git pull --rebase origin main
            git push
          fi
